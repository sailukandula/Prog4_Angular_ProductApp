<h2>Product List</h2>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Price</th>
      <th>Type</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let product of products">
      <td>{{ product.id }}</td>
      <td>{{ product.name }}</td>
      <td>{{ product.price }}</td>
      <td>{{ product.type }}</td>
    </tr>
  </tbody>
</table>

<h3>Add Product</h3>

<input type="number" placeholder="ID" [(ngModel)]="newProduct.id" name="id">
<input type="text" placeholder="Name" [(ngModel)]="newProduct.name" name="name">
<input type="number" placeholder="Price" [(ngModel)]="newProduct.price" name="price">
<input type="text" placeholder="Type" [(ngModel)]="newProduct.type" name="type">

<button (click)="addProduct()">Add</button>

<h4>Delete Product</h4>
<input type="number" placeholder="Enter ProductId to Delete" name="id">

<button (click)="deleteProduct()">DeleteProduct</button>
